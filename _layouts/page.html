---
layout: default
---
<div class="wrap wrap--narrow page">
  {%- if page.title -%}
  <header class="page-header">
    <h1 class="page-title"><span class="accent">$</span> {{ page.title }}</h1>
    {%- if page.subtitle -%}<p class="page-subtitle">{{ page.subtitle }}</p>{%- endif -%}
  </header>
  {%- endif -%}
  <div class="markdown">
    {{ content }}
  </div>
</div>
